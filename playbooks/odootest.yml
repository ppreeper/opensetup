---
- hosts: odoo
  name: Odoo Test
  roles:
    - odoo_base
    - odoo_community
    - odoo_user_chsh
    - odoo_config
    - odoo_db
    - userhome
    - lang_python
    - lang_js
    - gup_neovim
  tasks:
    - name: Update odoo user
      ansible.builtin.user:
        name: "odoo"
        ansible.builtin.shell: "/bin/bash"
        groups: "odoo,sudo"
